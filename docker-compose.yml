services:
  broker: # Kafka broker
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - 9092:9092
    healthcheck:
      test: ["CMD-SHELL", "nc -z broker 29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  # UI for Kafka
  kafdrop:
    image: obsidiandynamics/kafdrop
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: broker:29092
  
  producer:
    build: ./src/ingestion/producer
    restart: on-failure
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BROKER: broker:29092
      KAFKA_TOPIC: creditcard
    volumes:
      - ./src/scripts:/app/src/scripts:ro
  
  consumer:
    build: ./src/ingestion/consumer
    restart: on-failure
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BROKER: broker:29092
      KAFKA_TOPIC: creditcard
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: silver
  minio:
    image: minio/minio:latest
    ports:
      - "9001:9000" # S3 API
      - "9090:9090" # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in your environment or .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your environment or .env}
    command: server /data --console-address ":9090"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
      KAFKA_OUTPUT_TOPIC: creditcard-transformed
